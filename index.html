<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semáforo del Asma</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 520px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 25px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  font-size: 22px;
}

ul {
  font-size: 17px;
  line-height: 1.5;
}

button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.red {
  background: #d32f2f;
  color: white;
}

.green {
  background: #388e3c;
  color: white;
}

.yellow {
  background: #fbc02d;
  color: black;
}

.result-red {
  color: #d32f2f;
  font-size: 22px;
  font-weight: bold;
  text-align: center;
}

.result-green {
  color: #388e3c;
  font-size: 22px;
  font-weight: bold;
  text-align: center;
}

.center {
  text-align: center;
}
</style>
</head>

<body>
<div class="container">
  <div class="card" id="app"></div>
</div>

<script>
const app = document.getElementById("app");

function showRedCriteria() {
  app.innerHTML = `
    <h1>🔴 Señales de peligro</h1>
    <p>¿Se cumple <strong>alguno</strong> de estos criterios?</p>
    <ul>
      <li>Oxígeno menor de 94%</li>
      <li>No puedo hablar frases completas</li>
      <li>Me ahogo incluso caminando por casa</li>
      <li>Labios o dedos azulados</li>
      <li>Dolor fuerte y opresivo en el pecho</li>
      <li>La tos no me deja tumbarme</li>
      <li>El inhalador NO me ayuda</li>
    </ul>
    <button class="red" onclick="showUrgencias()">SÍ, alguno se cumple</button>
    <button class="green" onclick="showRevision()">NO, ninguno se cumple</button>
  `;
}

function showRevision() {
  app.innerHTML = `
    <h1>🟡 Revisión</h1>
    <ul>
      <li>¿Puedo hablar frases completas?</li>
      <li>¿Puedo caminar un poco por casa?</li>
      <li>¿Oxígeno 94% o más?</li>
    </ul>
    <button class="green" onclick="showConsejos()">SÍ</button>
    <button class="red" onclick="showUrgencias()">NO / estoy empeorando</button>
  `;
}

function showUrgencias() {
  app.innerHTML = `
    <h1 class="result-red">🔴 ACUDIR A URGENCIAS</h1>
    <p class="center">Busca atención médica ahora mismo.</p>
    <p class="center">Si es necesario, llama al <strong>112</strong>.</p>
    <button class="red" onclick="showRedCriteria()">Volver a empezar</button>
  `;
}

function showConsejos() {
  app.innerHTML = `
    <h1 class="result-green">🟢 Manejo en casa</h1>
    <ul>
      <li>Uso mi inhalador como me indicó el médico</li>
      <li>Me siento y suelto el aire despacio</li>
      <li>Me digo:<br><em>“Esto es miedo, no peligro ahora”</em></li>
      <li>⏱️ Espero 10–15 minutos</li>
    </ul>
    <button class="yellow" onclick="showRevision()">Volver a revisar</button>
  `;
}

showRedCriteria();
</script>
</body>
</html>
